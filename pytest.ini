[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步支持
asyncio_mode = auto

# 输出格式
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# 标记定义
markers =
    security: Security-related tests
    slow: Slow tests (integration)
    unit: Unit tests
    integration: Integration tests

# 环境变量
env =
    PYTHONIOENCODING=utf-8